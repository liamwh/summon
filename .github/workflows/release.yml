name: Release

on:
  push:
    tags:
      - "v*"

env:
  BINARY_NAME: summon
  CARGO_TERM_COLOR: always
  PACKAGE_NAME: summon-switcher
  TAP_REPO: liamwh/homebrew-summon-switcher

jobs:
  guard:
    name: Validate tag
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.guard.outputs.should_release }}
      tag: ${{ steps.guard.outputs.tag }}
      version: ${{ steps.guard.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - id: guard
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == env.PACKAGE_NAME) | .version')"
          if [ -z "${version}" ] || [ "${version}" = "null" ]; then
            echo "Could not resolve package version for ${PACKAGE_NAME}" >&2
            exit 1
          fi

          if [ "${tag}" != "v${version}" ]; then
            echo "Tag ${tag} does not match package version v${version}" >&2
            exit 1
          fi

          git fetch origin main --depth=1
          tag_commit="$(git rev-list -n 1 "${GITHUB_REF}")"
          if git merge-base --is-ancestor "${tag_commit}" origin/main; then
            should_release=true
          else
            should_release=false
            echo "Skipping release because ${tag} does not point at a commit on origin/main." >> "${GITHUB_STEP_SUMMARY}"
          fi

          {
            echo "should_release=${should_release}"
            echo "tag=${tag}"
            echo "version=${version}"
          } >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.target }}
    needs: guard
    if: needs.guard.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - artifact: summon-switcher-aarch64-apple-darwin
            os: macos-latest
            target: aarch64-apple-darwin
          - artifact: summon-switcher-x86_64-apple-darwin
            os: macos-latest
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --locked --release --target "${{ matrix.target }}"

      - name: Package artifact
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "dist/${BINARY_NAME}"
          tar -C dist -czf "dist/${{ matrix.artifact }}.tar.gz" "${BINARY_NAME}"
          shasum -a 256 "dist/${{ matrix.artifact }}.tar.gz" > "dist/${{ matrix.artifact }}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz*

  publish-crates-io:
    name: Publish crates.io
    needs: [guard, build]
    if: needs.guard.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Ensure crates.io token is configured
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "Missing CARGO_REGISTRY_TOKEN secret." >&2
            exit 1
          fi

      - name: Publish crate if needed
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          VERSION: ${{ needs.guard.outputs.version }}
        run: |
          set -euo pipefail

          published_version="$(
            curl -fsSL "https://crates.io/api/v1/crates/${PACKAGE_NAME}" 2>/dev/null \
              | jq -r '.crate.max_version // empty' || true
          )"

          if [ "${published_version}" = "${VERSION}" ]; then
            echo "${PACKAGE_NAME} ${VERSION} is already published."
            exit 0
          fi

          cargo publish --locked --package "${PACKAGE_NAME}" --token "${CARGO_REGISTRY_TOKEN}"

  github-release:
    name: Publish GitHub release
    needs: [guard, build, publish-crates-io]
    if: needs.guard.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          find artifacts -name '*.sha256' -exec cp {} release/ \;
          cat release/*.sha256 | sort > release/checksums.txt

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.guard.outputs.tag }}
        run: |
          set -euo pipefail

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" release/* --clobber
            exit 0
          fi

          notes_file="$(mktemp)"
          gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${TAG}" \
            -f target_commitish="${GITHUB_SHA}" \
            --jq '.body' > "${notes_file}"

          gh release create "${TAG}" release/* \
            --title "${TAG}" \
            --notes-file "${notes_file}"

  update-homebrew:
    name: Update Homebrew tap
    needs: [guard, build, github-release]
    if: needs.guard.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Ensure Homebrew tap token is configured
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "Missing HOMEBREW_TAP_TOKEN secret." >&2
            exit 1
          fi

      - name: Render formula
        env:
          VERSION: ${{ needs.guard.outputs.version }}
        run: |
          set -euo pipefail

          arm_sha="$(awk '{print $1}' artifacts/summon-switcher-aarch64-apple-darwin/summon-switcher-aarch64-apple-darwin.tar.gz.sha256)"
          intel_sha="$(awk '{print $1}' artifacts/summon-switcher-x86_64-apple-darwin/summon-switcher-x86_64-apple-darwin.tar.gz.sha256)"

          ARM_SHA="${arm_sha}" INTEL_SHA="${intel_sha}" python3 - <<'PY'
          from pathlib import Path
          import os

          template = Path("packaging/summon-switcher.rb").read_text()
          rendered = (
              template
              .replace("__VERSION__", os.environ["VERSION"])
              .replace("__ARM64_SHA256__", os.environ["ARM_SHA"])
              .replace("__X86_64_SHA256__", os.environ["INTEL_SHA"])
          )
          Path("summon-switcher.rb").write_text(rendered)
          PY

      - name: Commit formula update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.guard.outputs.version }}
        run: |
          set -euo pipefail

          gh auth setup-git
          gh repo clone "${TAP_REPO}" tap
          mkdir -p tap/Formula
          cp summon-switcher.rb tap/Formula/summon-switcher.rb

          cd tap
          if git diff --quiet -- Formula/summon-switcher.rb; then
            echo "Formula is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/summon-switcher.rb
          git commit -m "summon-switcher ${VERSION}"
          git push
